name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest tests/ -v
      - name: Demo pipeline smoke test
        run: agentproof demo -o /tmp/demo-project
      - name: Agent CI gate (simulate --check must pass on repaired project)
        run: agentproof simulate /tmp/demo-project --check
      - name: Domain pack + policy + cost + multi-target export
        run: |
          agentproof build --pack fintech -o /tmp/fintech
          agentproof fix /tmp/fintech
          agentproof policy /tmp/fintech --check
          agentproof cost /tmp/fintech
          agentproof commit /tmp/fintech -m baseline --author ci
          agentproof badge /tmp/fintech -o /tmp/badge.svg
          for t in langgraph openai crewai typescript; do
            agentproof export /tmp/fintech -t $t -o /tmp/export-$t
          done
      - name: CI gate (dogfood the GitHub Action's body)
        run: agentproof gate --pack healthcare --autofix --fail-under 85 --badge /tmp/health.svg

  action:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dogfood the reusable Action
        uses: ./
        with:
          pack: support
          fail-under: '85'
          autofix: 'true'
          badge: agent-badge.svg
