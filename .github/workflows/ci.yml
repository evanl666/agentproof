name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest tests/ -v
      - name: Demo pipeline smoke test
        run: agentproof demo -o /tmp/demo-project
      - name: Agent CI gate (simulate --check must pass on repaired project)
        run: agentproof simulate /tmp/demo-project --check
